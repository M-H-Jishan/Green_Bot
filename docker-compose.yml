services:
  backend:
    build: ./ChatbotServer
    env_file: ./ChatbotServer/.env
    ports:
      - "8000:8000"
    volumes:
      - ./ChatbotServer:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/1

  frontend:
    build: ./Frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Uncomment for PostgreSQL
  # db:
  #   image: postgres:16-alpine
  #   env_file: ./ChatbotServer/.env
  #   environment:
  #     POSTGRES_DB: ${DB_NAME:-greenbot}
  #     POSTGRES_USER: ${DB_USER:-postgres}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  static_files:
  media_files:
  redis_data:
